# Стратегия по умолчанию: balanced (сохраняем объём, режем хвосты IQR)
# Альтернатива: см. strategy_conservative.yaml

label_column: label
iqr_multiplier: 1.5

missing:
  numeric: median
  object_fill: ""
  object_mode: null

duplicates:
  mode: drop
  subset:
    - price_per_m2
    - area_m2
    - total_price_rub
    - source
  keep: first

outliers:
  mode: clip_iqr
  columns:
    - price_per_m2
    - total_price_rub
    - area_m2

coerce_city_or_region_str: true
