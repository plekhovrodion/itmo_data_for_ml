output_schema:
  title: str
  text: str
  summary: str
  url: str
  source: str
  published_at: datetime
  category: str
  collected_at: datetime
sources:
# HuggingFace - сохраняется в data/raw/hf_*/
- limit: 3000
  name: IlyaGusev/gazeta
  type: hf_dataset
# Kaggle - сохраняется в data/raw/kaggle_*/
- limit: 2000
  name: yutkin/corpus-of-russian-news-articles-from-lenta
  type: kaggle_dataset
- limit: 1500
  name: vfomenko/russian-news-2020
  type: kaggle_dataset
- limit: 1500
  name: vyhuholl/large-russian-news-dataset
  type: kaggle_dataset
# RSS - сохраняется в data/raw/parsed_rss/<feed>/
- feeds:
  - https://lenta.ru/rss/news
  - https://lenta.ru/rss/last24
  - https://ria.ru/export/rss2/archive/index.xml
  - https://ria.ru/export/rss2/index.xml
  - https://tass.ru/rss/v2.xml
  - https://www.kommersant.ru/RSS/news.xml
  limit_per_feed: 400
  type: rss_parser
# HTML - сохраняется в data/raw/parsed_html/<site>/
- url: https://lenta.ru/
  limit: 300
  type: html_parser
- url: https://ria.ru/
  limit: 300
  type: html_parser
- url: https://tass.ru/
  limit: 200
  type: html_parser
target_size: 10000
