# Параметры финального пайплайна (run_pipeline.py)
annotation:
  task: sentiment_classification
  confidence_threshold: 0.7
  # null = все строки после clean. Мало строк (напр. 20) + большой min_class_count в al → ошибка AL.
  max_rows: null

quality:
  strategy:
    missing: drop
    duplicates: drop
    # Без outliers: drop — иначе по длине текста выкидывается много строк (мало данных для модели).
    # Вернуть: outliers: drop

al:
  strategy: entropy
  n_iterations: 5
  batch_size: 20
  min_class_count: 10
  test_size: 0.2
  initial_labeled: 50
  random_state: 42

train:
  random_state: 42
  max_features: 40000
  ngram_range: [1, 2]
  logreg_C: 1.0
  max_iter: 500
  class_weight: balanced
  sublinear_tf: true
  use_full_merged_for_final_model: true
  final_eval_use_al_holdout: true
  final_test_size: 0.2
  # Вес для строк из финального AL-пула. На малых данных с class_weight=balanced часто лучше 1 (буст >1 режет accuracy).
  al_pool_row_weight_boost: 1
