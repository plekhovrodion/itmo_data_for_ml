# Быстрый смоук-тест цепочки: python run_pipeline.py --skip-collect --mock-annotation --config pipeline_config.smoke.yaml
annotation:
  task: sentiment_classification
  confidence_threshold: 0.7
  max_rows: 30
quality:
  strategy:
    missing: drop
    duplicates: drop
    outliers: drop
al:
  strategy: entropy
  n_iterations: 2
  batch_size: 5
  min_class_count: 2
  test_size: 0.25
  initial_labeled: 8
  random_state: 42
train:
  random_state: 42
  max_features: 4000
  ngram_range: [1, 2]
  logreg_C: 1.0
  max_iter: 300
  class_weight: balanced
  sublinear_tf: true
  use_full_merged_for_final_model: true
  final_eval_use_al_holdout: true
  al_pool_row_weight_boost: 1
