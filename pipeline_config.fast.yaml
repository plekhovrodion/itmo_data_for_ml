# Укороченный прогон с реальной zero-shot разметкой (меньше строк и итераций AL)
annotation:
  task: sentiment_classification
  # Выше 0.7 — больше строк попадёт в review_queue при реальной разметке (HITL для задания).
  confidence_threshold: 0.85
  max_rows: 500
quality:
  strategy:
    missing: drop
    duplicates: drop
    outliers: drop
al:
  strategy: entropy
  n_iterations: 3
  batch_size: 15
  min_class_count: 5
  test_size: 0.2
  initial_labeled: 40
  random_state: 42
train:
  random_state: 42
  max_features: 20000
  ngram_range: [1, 2]
  logreg_C: 1.0
  max_iter: 500
  class_weight: balanced
  sublinear_tf: true
  use_full_merged_for_final_model: true
  final_eval_use_al_holdout: true
  al_pool_row_weight_boost: 1
